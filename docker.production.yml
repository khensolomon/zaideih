services:
  db:
    image: mysql:8.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # NOTE on MySQL env vars and the "first-init only" rule:
    # MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD, and MYSQL_ALLOW_EMPTY_PASSWORD
    # are only consulted by the entrypoint when the data directory is empty
    # (i.e. a fresh /var/lib/mysql). Once the volume is initialized, these
    # variables are ignored on every subsequent container start. If you ever
    # need to change the app user or root auth, either edit the live DB
    # directly or wipe /opt/mysql/data after taking a backup with r2.py.
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=${DB_PWD}
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes  # Allows root to connect without a password
      - DB_DIR=${DB_DIR}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root"]
      interval: 45s
      timeout: 5s
      retries: 3
      start_period: 150s
    networks:
      - default
    volumes:
      - mysql_volume:/var/lib/mysql
      - ${DB_DIR}:/docker-entrypoint-initdb.d:ro
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/django-app:${COMMIT_SHA:-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # ports: 
    #   - "${APP_PORT}:${APP_PORT}"
    volumes:
      - static_volume:/code/staticfiles
      - storage_volume:${STORAGE_ROOT}:rw
      - media_volume:${MEDIA_ROOT}:rw
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "/code/scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - DEBUG=false
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - APP_NAME=${APP_NAME}
      - APP_PORT=${APP_PORT}

      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=${DB_PWD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PWD}

      - DB_NAME=${DB_NAME}
      - DB_USER=admin
      - DB_PWD=${DB_PWD}
      - DB_ROOT_PWD=${DB_ROOT_PWD}
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-3306}
      - DB_DIR=${DB_DIR}

      - STORAGE_ROOT=${STORAGE_ROOT}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - STORE_DIR=${STORE_DIR}
      - CACHE_DIR=${CACHE_DIR}

      - REPO_OWNER=${REPO_OWNER}
      - REPO_NAME=${REPO_NAME}

      - SECRET_KEY=${SECRET_KEY}
      - APP_SECRET_SHARED=${APP_SECRET_SHARED}

      - STORAGE_BACKEND=${STORAGE_BACKEND}

      - GCS_BUCKETNAME=${GCS_BUCKETNAME}
      - GCS_SECRET=${GCS_SECRET}
      - GOOGLE_APPLICATION_CREDENTIALS=${GCS_SECRET}

      - R2_BUCKETNAME=${R2_BUCKETNAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_ID=${R2_ACCESS_ID}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - WORKER_URL=${WORKER_URL}
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY}

      # NLTK_DATA on MyOrdbok

    # Removed the inline command block, Dockerfile ENTRYPOINT will handle the startup logic.
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        delay: 15s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.1
      restart_policy:
        condition: any
        delay: 10s

  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx-prod:${COMMIT_SHA:-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - static_volume:/code/staticfiles:ro
      - cache_volume:/code/cache:ro
    environment:
      - APP_PORT=${APP_PORT}
    networks:
      - default
      - gateway
    # ports:
    #   - "${APP_PORT}:${APP_PORT}"
      # - "80:80"
      # - "443:443"
    depends_on:
      - web
    deploy:
      replicas: 1
      endpoint_mode: dnsrr
      update_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 15s

networks:
  default:
    driver: overlay
    attachable: true
  gateway:
    external: true

volumes:
  mysql_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/mysql/data
  static_volume:
  cache_volume:
  storage_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_ROOT}
  media_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_ROOT}