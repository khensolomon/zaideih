name: Bulk Delete Container Versions

on:
  workflow_dispatch:
    inputs:
      min-versions-to-keep:
        description: 'How many recent versions to keep per package'
        required: true
        default: '5'
        type: string
      max-sweeps:
        description: 'Max delete sweeps per package (each sweep removes up to 100 versions)'
        required: true
        default: '3'
        type: choice
        options: ['1', '2', '3', '4', '6', '10']
      delete-only-untagged:
        description: 'Only delete untagged/broken images (safer)'
        required: true
        default: false
        type: boolean
      dry-run:
        description: 'Dry run — count versions, delete nothing'
        required: true
        default: true
        type: boolean

permissions:
  packages: write

env:
  OWNER: khensolomon

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Identify token and list all packages
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
        run: |
          echo "## 🔍 Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Token identity" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          gh api /user --jq '{login, type, id}' 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### All container packages visible to this token" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          gh api "/user/packages?package_type=container&per_page=100" --paginate \
            --jq '.[] | "\(.name) (owner: \(.owner.login), visibility: \(.visibility))"' \
            2>&1 | tee -a $GITHUB_STEP_SUMMARY || echo "FAILED" | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  cleanup:
    needs: diagnose
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['nginx-prod', 'django-app']
    steps:
      - name: Fetch versions for ${{ matrix.package }}
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          PACKAGE: ${{ matrix.package }}
        run: |
          # Try /user/packages first (authenticated user's own packages)
          echo "Trying /user/packages/container/$PACKAGE/versions ..."
          gh api "/user/packages/container/$PACKAGE/versions?per_page=100" \
            --paginate > versions.json 2> error.log
          rc=$?

          if [ $rc -ne 0 ] || ! jq -e 'type == "array"' versions.json >/dev/null 2>&1; then
            echo "::warning::/user/packages failed for $PACKAGE (rc=$rc), trying /users/$OWNER/..."
            echo "--- error from /user/packages ---"
            cat error.log
            echo "--- body of versions.json ---"
            head -c 500 versions.json; echo

            gh api "/users/$OWNER/packages/container/$PACKAGE/versions?per_page=100" \
              --paginate > versions.json 2> error.log
            rc=$?
          fi

          if [ $rc -ne 0 ] || ! jq -e 'type == "array"' versions.json >/dev/null 2>&1; then
            echo "::error::Both endpoints failed for $PACKAGE"
            echo "--- final error ---"
            cat error.log
            echo "--- body of versions.json ---"
            head -c 500 versions.json; echo
            # Write empty array so downstream jq doesn't crash
            echo "[]" > versions.json
          fi

          # gh --paginate produces one JSON array per page, concatenated.
          # Merge them into one flat array so the rest of the pipeline is simple.
          jq -s 'if length == 0 then [] else add end' versions.json > merged.json
          mv merged.json versions.json

          total=$(jq 'length' versions.json)
          tagged=$(jq '[.[] | select(.metadata.container.tags | length > 0)] | length' versions.json)
          untagged=$(jq '[.[] | select(.metadata.container.tags | length == 0)] | length' versions.json)

          echo "BEFORE: $PACKAGE has $total versions ($tagged tagged, $untagged untagged)"
          echo "BEFORE_COUNT=$total" >> $GITHUB_ENV

          {
            echo "### 📦 ${{ matrix.package }} — before"
            echo "- Total versions: **$total**"
            echo "- Tagged: $tagged"
            echo "- Untagged: $untagged"
            echo "- Will keep newest: ${{ inputs.min-versions-to-keep }}"
            echo "- Max deletable this run: up to $(( ${{ inputs.max-sweeps }} * 100 ))"
          } >> $GITHUB_STEP_SUMMARY

      - name: Delete old versions for ${{ matrix.package }}
        if: ${{ !inputs.dry-run && env.BEFORE_COUNT != '0' }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          MAX_SWEEPS: ${{ inputs.max-sweeps }}
          MIN_KEEP: ${{ inputs.min-versions-to-keep }}
          PACKAGE: ${{ matrix.package }}
          UNTAGGED_ONLY: ${{ inputs.delete-only-untagged }}
        run: |
          set +e
          total_deleted=0

          for i in $(seq 1 $MAX_SWEEPS); do
            echo "::group::Sweep $i for $PACKAGE"

            # Re-fetch each sweep — the list changes as we delete
            gh api "/user/packages/container/$PACKAGE/versions?per_page=100" \
              --paginate 2>/dev/null \
              | jq -s 'if length == 0 then [] else add end' > current.json

            remaining=$(jq 'length' current.json)
            echo "Versions remaining: $remaining"

            if [ "$remaining" -le "$MIN_KEEP" ]; then
              echo "Nothing left to delete (remaining=$remaining ≤ keep=$MIN_KEEP)."
              echo "::endgroup::"
              break
            fi

            if [ "$UNTAGGED_ONLY" = "true" ]; then
              filter='[.[] | select(.metadata.container.tags | length == 0)]'
            else
              filter='.'
            fi

            # API returns newest-first; drop the first MIN_KEEP, take 100
            ids=$(jq -r "$filter | .[${MIN_KEEP}:] | .[:100] | .[].id" current.json)
            count=$(echo "$ids" | grep -c . || true)
            echo "Deleting $count versions in this sweep..."

            deleted=0
            failed=0
            for id in $ids; do
              if gh api -X DELETE \
                  "/user/packages/container/$PACKAGE/versions/$id" \
                  --silent 2>/dev/null; then
                deleted=$((deleted + 1))
              else
                failed=$((failed + 1))
              fi
            done
            total_deleted=$((total_deleted + deleted))
            echo "Sweep $i: deleted=$deleted, failed=$failed"
            echo "::endgroup::"

            if [ "$deleted" -eq 0 ]; then
              echo "No deletions this sweep, stopping early."
              break
            fi
          done

          echo "TOTAL_DELETED=$total_deleted" >> $GITHUB_ENV

      - name: Report final state for ${{ matrix.package }}
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          PACKAGE: ${{ matrix.package }}
        run: |
          gh api "/user/packages/container/$PACKAGE/versions?per_page=100" \
            --paginate 2>/dev/null \
            | jq -s 'if length == 0 then [] else add end' > after.json
          after=$(jq 'length' after.json)
          {
            echo "### ✅ ${{ matrix.package }} — after"
            echo "- Remaining: **$after**"
            echo "- Deleted this run: **${TOTAL_DELETED:-0}**"
          } >> $GITHUB_STEP_SUMMARY