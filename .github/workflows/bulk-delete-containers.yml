name: Bulk Delete Container

on:
  workflow_dispatch:
    inputs:
      min-versions-to-keep:
        description: 'How many recent versions to keep per package'
        required: true
        default: '5'
        type: string
      delete-only-untagged:
        description: 'Only delete untagged/broken images (safer)'
        required: true
        default: false
        type: boolean
      dry-run:
        description: 'Dry run — count versions, delete nothing'
        required: true
        default: true
        type: boolean

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['zaideih/nginx-prod', 'zaideih/django-app']
        # Six sweep slots — each sweep deletes up to 100 versions.
        # Covers up to ~600 versions per package per run.
        sweep: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Count versions for ${{ matrix.package }} (sweep ${{ matrix.sweep }})
        if: ${{ inputs.dry-run && matrix.sweep == 1 }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
        run: |
          total=$(gh api \
            "/users/khensolomon/packages/container/${{ matrix.package }}/versions?per_page=100" \
            --paginate --jq '. | length' | awk '{s+=$1} END {print s+0}')
          echo "Total versions for ${{ matrix.package }}: $total"
          echo "Would keep newest: ${{ inputs.min-versions-to-keep }}"
          echo "Would delete: up to $((total - ${{ inputs.min-versions-to-keep }}))"
          echo "### ${{ matrix.package }}: $total versions, would delete $((total - ${{ inputs.min-versions-to-keep }}))" >> $GITHUB_STEP_SUMMARY

      - name: Delete sweep ${{ matrix.sweep }} for ${{ matrix.package }}
        if: ${{ !inputs.dry-run }}
        uses: actions/delete-package-versions@v5
        with:
          owner: 'khensolomon'
          package-name: ${{ matrix.package }}
          package-type: 'container'
          min-versions-to-keep: ${{ fromJSON(inputs.min-versions-to-keep) }}
          delete-only-untagged-versions: ${{ inputs.delete-only-untagged }}
          token: ${{ secrets.DELETE_PACKAGES_TOKEN }}