name: Bulk Delete Container

on:
  workflow_dispatch:
    inputs:
      min-versions-to-keep:
        description: 'How many recent versions to keep per package'
        required: true
        default: '5'
        type: string
      max-sweeps:
        description: 'Max delete sweeps per package (each sweep removes up to 100 versions)'
        required: true
        default: '3'
        type: choice
        options: ['1', '2', '3', '4', '6', '10']
      delete-only-untagged:
        description: 'Only delete untagged/broken images (safer)'
        required: true
        default: false
        type: boolean
      dry-run:
        description: 'Dry run — count versions, delete nothing'
        required: true
        default: true
        type: boolean

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['nginx-prod', 'django-app']
    steps:
      - name: Diagnose API access for ${{ matrix.package }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          PACKAGE: ${{ matrix.package }}
        run: |
          echo "::group::Token identity"
          gh api /user --jq '{login, type}' || echo "Failed to identify user"
          echo "::endgroup::"

          echo "::group::Try /user/packages (authenticated user's packages)"
          gh api "/user/packages/container/$PACKAGE/versions?per_page=100" \
            --paginate 2>&1 | head -50 || true
          echo "::endgroup::"

          echo "::group::Try /users/khensolomon/packages (public endpoint)"
          gh api "/users/khensolomon/packages/container/$PACKAGE/versions?per_page=100" \
            --paginate 2>&1 | head -50 || true
          echo "::endgroup::"

      - name: Count versions for ${{ matrix.package }}
        id: count
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          PACKAGE: ${{ matrix.package }}
        run: |
          # Save full paginated output to a file so we can both count it and reuse it
          gh api "/user/packages/container/$PACKAGE/versions?per_page=100" \
            --paginate > versions.json 2>/dev/null || true

          if [ ! -s versions.json ]; then
            echo "::warning::No data from /user/packages, trying /users/khensolomon/..."
            gh api "/users/khensolomon/packages/container/$PACKAGE/versions?per_page=100" \
              --paginate > versions.json 2>/dev/null || true
          fi

          # gh --paginate concatenates pages as separate JSON arrays.
          # Use `jq -s 'add | length'` to slurp them and count properly.
          if [ -s versions.json ]; then
            total=$(jq -s 'add | length' versions.json)
            tagged=$(jq -s '[.[] | .[] | select(.metadata.container.tags | length > 0)] | length' versions.json)
            untagged=$(jq -s '[.[] | .[] | select(.metadata.container.tags | length == 0)] | length' versions.json)
          else
            total=0
            tagged=0
            untagged=0
          fi

          echo "BEFORE: $PACKAGE has $total versions ($tagged tagged, $untagged untagged)"
          echo "before_count=$total" >> $GITHUB_OUTPUT
          echo "BEFORE_COUNT=$total" >> $GITHUB_ENV

          {
            echo "### ${{ matrix.package }} — before"
            echo "- Total versions: **$total**"
            echo "- Tagged: $tagged"
            echo "- Untagged: $untagged"
            echo "- Will keep newest: ${{ inputs.min-versions-to-keep }}"
            echo "- Max deletable this run: up to $(( ${{ inputs.max-sweeps }} * 100 ))"
            if [ "$total" -eq 0 ]; then
              echo "- ⚠️ Got 0 versions — check the 'Diagnose API access' step above"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Run sweeps for ${{ matrix.package }}
        if: ${{ !inputs.dry-run && env.BEFORE_COUNT != '0' }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          MAX_SWEEPS: ${{ inputs.max-sweeps }}
          MIN_KEEP: ${{ inputs.min-versions-to-keep }}
          PACKAGE: ${{ matrix.package }}
          UNTAGGED_ONLY: ${{ inputs.delete-only-untagged }}
        run: |
          set +e

          for i in $(seq 1 $MAX_SWEEPS); do
            echo "::group::Sweep $i for $PACKAGE"

            gh api "/user/packages/container/$PACKAGE/versions?per_page=100" \
              --paginate > current.json 2>/dev/null || true

            remaining=$(jq -s 'add | length' current.json)
            echo "Versions remaining: $remaining"

            if [ "$remaining" -le "$MIN_KEEP" ]; then
              echo "Nothing left to delete (remaining=$remaining ≤ keep=$MIN_KEEP)."
              echo "::endgroup::"
              break
            fi

            if [ "$UNTAGGED_ONLY" = "true" ]; then
              filter='[.[] | .[] | select(.metadata.container.tags | length == 0) | .id]'
            else
              filter='[.[] | .[] | .id]'
            fi

            # API returns newest-first; skip MIN_KEEP from the front, take 100
            ids=$(jq -s "$filter | .[${MIN_KEEP}:] | .[:100] | .[]" current.json)
            count=$(echo "$ids" | grep -c . || true)
            echo "Deleting $count versions in this sweep..."

            deleted=0
            failed=0
            for id in $ids; do
              if gh api -X DELETE \
                  "/user/packages/container/$PACKAGE/versions/$id" \
                  --silent 2>/dev/null; then
                deleted=$((deleted + 1))
              else
                failed=$((failed + 1))
              fi
            done
            echo "Sweep $i: deleted=$deleted, failed=$failed"
            echo "::endgroup::"

            if [ "$deleted" -eq 0 ]; then
              echo "No deletions this sweep, stopping early."
              break
            fi
          done

      - name: Count versions after cleanup for ${{ matrix.package }}
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          PACKAGE: ${{ matrix.package }}
        run: |
          gh api "/user/packages/container/$PACKAGE/versions?per_page=100" \
            --paginate > after.json 2>/dev/null || true
          after=$(jq -s 'add | length' after.json 2>/dev/null || echo 0)
          deleted=$((BEFORE_COUNT - after))
          echo "AFTER: $PACKAGE has $after versions ($deleted deleted)"
          {
            echo "### ${{ matrix.package }} — after"
            echo "- Remaining: **$after**"
            echo "- Deleted this run: **$deleted**"
          } >> $GITHUB_STEP_SUMMARY