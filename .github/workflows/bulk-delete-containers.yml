name: Bulk Delete Container

on:
  workflow_dispatch:
    inputs:
      min-versions-to-keep:
        description: 'How many recent versions to keep per package'
        required: true
        default: '5'
        type: string
      max-sweeps:
        description: 'Max delete sweeps per package (each sweep removes up to 100 versions)'
        required: true
        default: '3'
        type: choice
        options: ['1', '2', '3', '4', '6', '10']
      delete-only-untagged:
        description: 'Only delete untagged/broken images (safer)'
        required: true
        default: false
        type: boolean
      dry-run:
        description: 'Dry run — count versions, delete nothing'
        required: true
        default: true
        type: boolean

permissions:
  packages: write

env:
  OWNER: khensolomon

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['nginx-prod', 'django-app']
    steps:
      - name: Count versions for ${{ matrix.package }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
        run: |
          total=$(gh api \
            "/users/$OWNER/packages/container/${{ matrix.package }}/versions?per_page=100" \
            --paginate --jq '. | length' | awk '{s+=$1} END {print s+0}')
          echo "BEFORE: ${{ matrix.package }} has $total versions"
          echo "### ${{ matrix.package }} — before" >> $GITHUB_STEP_SUMMARY
          echo "- Total versions: $total" >> $GITHUB_STEP_SUMMARY
          echo "- Will keep newest: ${{ inputs.min-versions-to-keep }}" >> $GITHUB_STEP_SUMMARY
          echo "- Max deletable this run: up to $(( ${{ inputs.max-sweeps }} * 100 ))" >> $GITHUB_STEP_SUMMARY
          echo "BEFORE_COUNT=$total" >> $GITHUB_ENV

      - name: Run sweeps for ${{ matrix.package }}
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          MAX_SWEEPS: ${{ inputs.max-sweeps }}
          MIN_KEEP: ${{ inputs.min-versions-to-keep }}
          PACKAGE: ${{ matrix.package }}
          UNTAGGED_ONLY: ${{ inputs.delete-only-untagged }}
        run: |
          set +e  # don't abort on individual sweep failures

          for i in $(seq 1 $MAX_SWEEPS); do
            echo "::group::Sweep $i for $PACKAGE"

            # How many versions remain right now?
            remaining=$(gh api \
              "/users/$OWNER/packages/container/$PACKAGE/versions?per_page=100" \
              --paginate --jq '. | length' | awk '{s+=$1} END {print s+0}')
            echo "Versions remaining: $remaining"

            if [ "$remaining" -le "$MIN_KEEP" ]; then
              echo "Nothing left to delete (remaining=$remaining ≤ keep=$MIN_KEEP). Stopping."
              echo "::endgroup::"
              break
            fi

            # Build deletion list:
            # - versions are returned newest-first by the API
            # - skip the first MIN_KEEP (those are the ones we want to keep)
            # - take up to 100 of the rest
            # - optionally filter to untagged only
            if [ "$UNTAGGED_ONLY" = "true" ]; then
              filter=".[] | select(.metadata.container.tags | length == 0) | .id"
            else
              filter=".[].id"
            fi

            ids=$(gh api \
              "/users/$OWNER/packages/container/$PACKAGE/versions?per_page=100" \
              --paginate --jq "$filter" \
              | tail -n +$((MIN_KEEP + 1)) \
              | head -n 100)

            count=$(echo "$ids" | grep -c . || true)
            echo "Deleting $count versions in this sweep..."

            deleted=0
            failed=0
            for id in $ids; do
              if gh api -X DELETE \
                  "/users/$OWNER/packages/container/$PACKAGE/versions/$id" \
                  --silent 2>/dev/null; then
                deleted=$((deleted + 1))
              else
                failed=$((failed + 1))
              fi
            done
            echo "Sweep $i: deleted=$deleted, failed=$failed"
            echo "::endgroup::"

            # If nothing was deleted this sweep, no point continuing
            if [ "$deleted" -eq 0 ]; then
              echo "No deletions this sweep, stopping early."
              break
            fi
          done

      - name: Count versions after cleanup for ${{ matrix.package }}
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.DELETE_PACKAGES_TOKEN }}
        run: |
          after=$(gh api \
            "/users/$OWNER/packages/container/${{ matrix.package }}/versions?per_page=100" \
            --paginate --jq '. | length' | awk '{s+=$1} END {print s+0}')
          deleted=$((BEFORE_COUNT - after))
          echo "AFTER: ${{ matrix.package }} has $after versions ($deleted deleted)"
          echo "### ${{ matrix.package }} — after" >> $GITHUB_STEP_SUMMARY
          echo "- Remaining: $after" >> $GITHUB_STEP_SUMMARY
          echo "- Deleted this run: $deleted" >> $GITHUB_STEP_SUMMARY