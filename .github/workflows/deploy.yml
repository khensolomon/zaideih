name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Build Frontend
        run: |
          npm ci
          npm run build
          echo "=== Vite Build Output ==="
          ls -la staticfiles/ || echo "staticfiles folder not found"
          ls -la staticfiles/.vite/ 2>/dev/null || echo "No .vite folder"
          ls -la staticfiles/manifest.json 2>/dev/null || echo "No manifest.json"
          echo "=== Size of staticfiles ==="
          du -sh staticfiles/

      - name: Verify built assets before Docker build
        run: |
          echo "Static files size:"
          du -sh staticfiles/
          ls -R staticfiles/ | head -30

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Recreate .env file from Secret
        run: |
          printf "%s" "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Initialize/Update Stack
        run: |
          set -a
          [ -f .env ] && . .env
          set +a
          export GITHUB_REPOSITORY=${{ github.repository }}
          mkdir -p "$DB_DIR" "$STORAGE_DIR" "$MEDIA_DIR"
          
          docker compose -f docker.production.yml pull
          # --detach=false ensures the command waits for the update to finish/fail
          docker stack deploy -c docker.production.yml --with-registry-auth --detach=false zaideih

      - name: Wait for MySQL readiness
        run: |
          NETWORK_NAME="zaideih_default"
          set -a
          [ -f .env ] && . .env
          set +a
          for i in {1..20}; do
            if docker run --rm --network $NETWORK_NAME mysql:8.0 mysqladmin ping -h db -u root --password="$MYSQL_ROOT_PASSWORD" > /dev/null 2>&1; then
              echo "MySQL is ready!"
              break
            fi
            sleep 5
          done

      - name: Run Database Migrations
        run: |
          NETWORK_NAME="zaideih_default"
          IMAGE_NAME="ghcr.io/${{ github.repository }}/django-app:latest"
          set -a
          [ -f .env ] && . .env
          set +a
          docker run --rm --network $NETWORK_NAME --env-file .env $IMAGE_NAME python manage.py migrate --noinput

      - name: Verify Data Import
        run: |
          set -a
          [ -f .env ] && . .env
          set +a
          DB_CONTAINER=$(docker ps -q -f name=zaideih_db)
          echo "--- DATA VERIFICATION ---"
          docker exec -i $DB_CONTAINER mysql -u root -p"$MYSQL_ROOT_PASSWORD" "$DB_NAME" -e "SELECT COUNT(*) as album_count FROM album;" || echo "Table 'album' not found."

      - name: Verify Healthy Deployment
        run: |
          echo "Monitoring deployment health..."
          # Since we use --detach=false, we just check final state
          RUNNING=$(docker service ls --filter name=zaideih_web --format "{{.Replicas}}")
          echo "Final Replicas: $RUNNING"
          if [[ "$RUNNING" == "2/2" ]]; then
            echo "Deployment successful!"
            exit 0
          else
            echo "Deployment failed health checks. Showing logs..."
            docker service logs zaideih_web --tail 50
            exit 1
          fi