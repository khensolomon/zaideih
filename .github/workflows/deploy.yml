name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Recreate .env file from Secret
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Initialize/Update Stack
        run: |
          # Load variables from .env to be used for stack interpolation
          export $(grep -v '^#' .env | xargs)
          export GITHUB_REPOSITORY=${{ github.repository }}
          
          # Setup Absolute Paths for Swarm
          export DB_DIR=$PWD/mysql
          export STORAGE_DIR=$PWD/storage
          export MEDIA_DIR=$PWD/media
          mkdir -p $DB_DIR $STORAGE_DIR $MEDIA_DIR
          
          docker compose -f docker-compose.prod.yml pull
          docker stack deploy -c docker-compose.prod.yml --with-registry-auth zaideih

      - name: Run Database Migrations
        run: |
          NETWORK_NAME="zaideih_default"
          IMAGE_NAME="ghcr.io/${{ github.repository }}/django-app:latest"
          
          # Load env for MySQL credentials and app settings
          set -a
          [ -f .env ] && . .env
          set +a
          
          echo "Waiting for MySQL readiness..."
          for i in {1..20}; do
            if docker run --rm --network $NETWORK_NAME mysql:8.0 mysqladmin ping -h db -u root --password="$MYSQL_ROOT_PASSWORD" > /dev/null 2>&1; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i: DB starting... Sleeping 10s"
            sleep 10
          done

          docker run --rm --network $NETWORK_NAME --env-file .env $IMAGE_NAME python manage.py migrate --noinput

      - name: Wait for Healthy Deployment
        run: |
          echo "Monitoring deployment progress..."
          for i in {1..20}; do
            # Safely check UpdateStatus
            STATUS=$(docker service inspect zaideih_web --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}stable{{end}}')
            RUNNING=$(docker service ls --filter name=zaideih_web --format "{{.Replicas}}")
            echo "Current Status: $STATUS | Replicas: $RUNNING"
            
            if [[ "$RUNNING" == "2/2" ]]; then
              echo "Deployment successful!"
              exit 0
            fi
            
            if [[ "$STATUS" == "failed" || "$STATUS" == "rollback_completed" ]]; then
              echo "Update failed. Checking logs..."
              docker service logs zaideih_web --tail 100
              exit 1
            fi
            sleep 15
          done
          
          echo "--- FINAL DIAGNOSTIC: Deployment Timeout ---"
          docker service ps zaideih_web --no-trunc
          docker service logs zaideih_web --tail 100
          exit 1