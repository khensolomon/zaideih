name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Recreate .env file from Secret
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Pull Latest Images
        run: |
          export GITHUB_REPOSITORY=${{ github.repository }}
          export $(grep -v '^#' .env | xargs)
          if docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          else
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
          fi

      - name: Initialize/Update Stack
        run: |
          export GITHUB_REPOSITORY=${{ github.repository }}
          export $(grep -v '^#' .env | xargs)
          docker stack deploy -c docker-compose.yml -c docker-compose.prod.yml --with-registry-auth zaideih

      - name: Run Database Migrations
        run: |
          NETWORK_NAME="zaideih_default"
          # Wait for network and DB to be ready
          sleep 10
          docker run --rm \
            --network $NETWORK_NAME \
            --env-file .env \
            ghcr.io/${{ github.repository }}/django-app:latest \
            python manage.py migrate --noinput

      - name: Refresh Web Service
        run: |
          # Force the web service to pick up migration changes
          docker service update --force zaideih_web