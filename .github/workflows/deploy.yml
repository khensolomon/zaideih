name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    # MOVE FILTER HERE: This prevents the build from running at all unless you want a deployment
    if: startsWith(github.event.head_commit.message, 'deploy:') && length(github.event.head_commit.message) > 8
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    # This job only runs if 'build' succeeds and the filter passed
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Recreate .env file from Secret
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Load Environment Variables
        run: |
          # We use GITHUB_ENV to make variables available to all subsequent steps
          grep -v '^#' .env >> $GITHUB_ENV

      - name: Pull Latest Images
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

      - name: Run Database Migrations
        run: |
          docker run --rm \
            --env-file .env \
            ghcr.io/${{ github.repository }}/django-app:latest \
            python manage.py migrate --noinput

      - name: Deploy Swarm Stack
        run: |
          # The variables loaded in the 'Load Environment Variables' step
          # are automatically available here for YAML interpolation.
          docker stack deploy -c docker-compose.yml -c docker-compose.prod.yml --with-registry-auth zaideih