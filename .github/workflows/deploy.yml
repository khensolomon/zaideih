name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Recreate .env file from Secret
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Initialize/Update Stack
        run: |
          # 1. Load variables
          export $(grep -v '^#' .env | xargs)
          export GITHUB_REPOSITORY=${{ github.repository }}
          
          # 2. Setup Absolute Paths
          export DB_DIR=$PWD/mysql
          export STORAGE_DIR=$PWD/storage
          export MEDIA_DIR=$PWD/media
          mkdir -p $DB_DIR $STORAGE_DIR $MEDIA_DIR
          
          # 3. Pull and Deploy
          docker compose -f docker-compose.prod.yml pull
          docker stack deploy -c docker-compose.prod.yml --with-registry-auth zaideih

      - name: Run Database Migrations
        run: |
          NETWORK_NAME="zaideih_default"
          IMAGE_NAME="ghcr.io/${{ github.repository }}/django-app:latest"
          
          echo "Waiting for 'db' to resolve..."
          for i in {1..15}; do
            if docker run --rm --network $NETWORK_NAME alpine nslookup db > /dev/null 2>&1; then
              echo "DNS Resolved!"
              break
            fi
            sleep 10
          done

          docker run --rm \
            --network $NETWORK_NAME \
            --env-file .env \
            $IMAGE_NAME \
            python manage.py migrate --noinput

      - name: Wait for Healthy Deployment
        run: |
          echo "Monitoring deployment progress..."
          
          for i in {1..30}; do
            # Safely check UpdateStatus only if it exists
            STATUS=$(docker service inspect zaideih_web --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}stable{{end}}')
            # Also check if actual replicas match desired replicas
            RUNNING=$(docker service ls --filter name=zaideih_web --format "{{.Replicas}}")
            
            echo "Current Update Status: $STATUS | Replicas: $RUNNING"
            
            # If status is stable or completed, and replicas are 2/2, we are good
            if [[ "$STATUS" == "completed" || "$STATUS" == "stable" ]] && [[ "$RUNNING" == "2/2" ]]; then
              echo "Deployment successful and healthy!"
              exit 0
            fi
            
            if [[ "$STATUS" == "rollback_completed" || "$STATUS" == "rollback_started" || "$STATUS" == "failed" ]]; then
              echo "Deployment FAILED or Rolling Back. Showing logs:"
              docker service logs zaideih_web --tail 100
              exit 1
            fi
            
            sleep 10
          done
          
          echo "Deployment timeout reached. Final service state:"
          docker service logs zaideih_web --tail 50
          docker stack ps zaideih --no-trunc
          exit 1