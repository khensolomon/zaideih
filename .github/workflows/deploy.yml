name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Recreate .env file from Secret
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Pull Latest Images
        run: |
          export GITHUB_REPOSITORY=${{ github.repository }}
          export $(grep -v '^#' .env | xargs)
          if docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.prod.yml pull
          else
            docker-compose -f docker-compose.prod.yml pull
          fi

      - name: Initialize/Update Stack
        run: |
          export GITHUB_REPOSITORY=${{ github.repository }}
          export $(grep -v '^#' .env | xargs)
          docker stack deploy -c docker-compose.prod.yml --with-registry-auth zaideih

      - name: Run Database Migrations (with DNS Check)
        run: |
          NETWORK_NAME="zaideih_default"
          IMAGE_NAME="ghcr.io/${{ github.repository }}/django-app:latest"
          
          echo "Verifying network '$NETWORK_NAME' exists..."
          if ! docker network ls | grep -q "$NETWORK_NAME"; then
             echo "Error: Network $NETWORK_NAME not found. Swarm might still be initializing it."
             exit 1
          fi

          echo "Waiting for DNS resolution of 'db' within the overlay network..."
          
          # Retry loop to verify DNS resolution before running migrations
          # We use a tiny alpine container to 'nslookup' the DB host
          for i in {1..12}; do
            echo "Attempt $i: Checking if 'db' is resolvable..."
            if docker run --rm --network $NETWORK_NAME alpine nslookup db > /dev/null 2>&1; then
              echo "DNS Resolved! 'db' is now visible."
              break
            fi
            
            if [ $i -eq 12 ]; then
              echo "Error: 'db' hostname never became resolvable in the network."
              exit 1
            fi
            echo "DNS not ready. Sleeping 10s..."
            sleep 10
          done

          echo "Running Django Migrations..."
          docker run --rm \
            --network $NETWORK_NAME \
            --env-file .env \
            $IMAGE_NAME \
            python manage.py migrate --noinput

      - name: Refresh Web Service
        run: |
          docker service update --force zaideih_web