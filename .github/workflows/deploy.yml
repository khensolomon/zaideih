name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Recreate .env file from Secret
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Pull Latest Images
        run: |
          export GITHUB_REPOSITORY=${{ github.repository }}
          export $(grep -v '^#' .env | xargs)
          docker compose -f docker-compose.prod.yml pull

      - name: Initialize/Update Stack
        run: |
          # 1. Load variables from .env
          export $(grep -v '^#' .env | xargs)
          
          # 2. FORCE ABSOLUTE PATHS for Swarm
          # Swarm fails if these are relative. We use $PWD to get the full path on your VM.
          export GITHUB_REPOSITORY=${{ github.repository }}
          export DB_DIR=$PWD/mysql
          export STORAGE_DIR=$PWD/storage
          export MEDIA_DIR=$PWD/media
          
          # 3. Create directories if they don't exist to prevent "bind source path does not exist"
          mkdir -p $DB_DIR $STORAGE_DIR $MEDIA_DIR
          
          docker stack deploy -c docker-compose.prod.yml --with-registry-auth zaideih

      - name: Run Database Migrations (with DNS Check)
        run: |
          NETWORK_NAME="zaideih_default"
          IMAGE_NAME="ghcr.io/${{ github.repository }}/django-app:latest"
          
          echo "Waiting for DNS resolution of 'db'..."
          
          for i in {1..15}; do
            if [ $((i % 3)) -eq 0 ]; then
              echo "--- DIAGNOSTIC: Service Status ---"
              docker stack ps zaideih --no-trunc
            fi

            if docker run --rm --network $NETWORK_NAME alpine nslookup db > /dev/null 2>&1; then
              echo "DNS Resolved! 'db' is now visible."
              break
            fi
            
            if [ $i -eq 15 ]; then
              echo "CRITICAL ERROR: 'db' hostname never resolved."
              docker service logs zaideih_db --tail 50
              exit 1
            fi
            echo "Attempt $i: DNS not ready. Sleeping 10s..."
            sleep 10
          done

          echo "Running Django Migrations..."
          docker run --rm \
            --network $NETWORK_NAME \
            --env-file .env \
            $IMAGE_NAME \
            python manage.py migrate --noinput

      - name: Refresh Web Service
        run: |
          docker service update --force zaideih_web