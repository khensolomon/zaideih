name: Build and Deploy

# ============================================================================
# CALLER STUB — lives in each app repo (this example: zaideih).
# Holds the triggers (these MUST live in the caller, not the reusable
# workflow) and forwards to khensolomon/lethil. The only per-repo change is
# the `app:` value below.
#
# `secrets: inherit` passes every repo/org/environment secret by name —
# which works because secret names are consistent across your projects
# (ENV_BASE, ENV_OVERRIDES, SSH_PRIVATE_KEY, CF_SERVICE_TOKEN_*,
# VM_RUNNER_STATUS_PAT, GITHUB_TOKEN). `vars.*` and the deploy_via_*
# environments resolve from this caller too.
# ============================================================================

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: "What to do"
        options:
          - dry-run
          - build-only
          - build-and-deploy
        default: dry-run
      target:
        type: choice
        description: "Which deploy path (ignored for build-only and dry-run-base modes)"
        options:
          - selfhosted
          - tunnel
          - ssh
        default: tunnel

jobs:
  call:
    # Pin to a tag once you've cut one (e.g. @v1). @main tracks latest.
    uses: khensolomon/lethil/.github/workflows/deploy.yml@master
    with:
      app: zaideih
      # On push these inputs are empty, so the defaults apply and the push
      # routing (commit-message tags) inside the core workflow takes over.
      mode: ${{ inputs.mode || 'dry-run' }}
      target: ${{ inputs.target || 'tunnel' }}
    secrets: inherit
