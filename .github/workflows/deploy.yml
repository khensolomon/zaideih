name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/django-app:latest

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx-prod:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR on VM
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Recreate .env file from Secret
        run: |
          printf "%s" "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

      - name: Initialize/Update Stack
        run: |
          # 1. Simple .env loading (assuming static values)
          set -a
          [ -f .env ] && . .env
          set +a

          export GITHUB_REPOSITORY=${{ github.repository }}
          
          # 2. Path verification
          echo "Final Resolved Paths:"
          echo "DB_DIR: $DB_DIR"
          echo "STORAGE_DIR: $STORAGE_DIR"
          
          # 3. Create directories
          mkdir -p "$DB_DIR" "$STORAGE_DIR" "$MEDIA_DIR"
          
          docker compose -f docker-compose.prod.yml pull
          docker stack deploy -c docker-compose.prod.yml --with-registry-auth zaideih

      - name: Run Database Migrations & Data Import
        run: |
          NETWORK_NAME="zaideih_default"
          IMAGE_NAME="ghcr.io/${{ github.repository }}/django-app:latest"
          
          set -a
          [ -f .env ] && . .env
          set +a

          echo "Waiting for MySQL readiness..."
          for i in {1..20}; do
            if docker run --rm --network $NETWORK_NAME mysql:8.0 mysqladmin ping -h db -u root --password="$MYSQL_ROOT_PASSWORD" > /dev/null 2>&1; then
              echo "MySQL is ready!"
              break
            fi
            sleep 10
          done

          # 1. FORCE SQL IMPORT
          SQL_FILE="${DB_DIR}/latest.sql"
          DB_CONTAINER=$(docker ps -q -f name=zaideih_db)
          
          if [ -f "$SQL_FILE" ]; then
            echo "Found $SQL_FILE. Importing..."
            
            # Create a temporary config file inside the container to handle auth safely
            docker exec -u root $DB_CONTAINER sh -c "printf '[client]\nuser=root\npassword=\"$MYSQL_ROOT_PASSWORD\"\n' > /tmp/temp_import.cnf"
            
            # Run import using the config file
            docker exec -i $DB_CONTAINER mysql --defaults-extra-file=/tmp/temp_import.cnf "$DB_NAME" < "$SQL_FILE"
            
            # Cleanup config
            docker exec $DB_CONTAINER rm /tmp/temp_import.cnf
            echo "Import complete."
          else
            echo "Note: latest.sql not found at $SQL_FILE. Relying on existing volume data."
          fi

          # 2. RUN DJANGO MIGRATIONS
          docker run --rm --network $NETWORK_NAME --env-file .env $IMAGE_NAME python manage.py migrate --noinput

          # 3. VERIFY IMPORT
          echo "--- DATA VERIFICATION ---"
          docker exec -i $DB_CONTAINER mysql -u root -p"$MYSQL_ROOT_PASSWORD" "$DB_NAME" -e "SELECT COUNT(*) as album_count FROM album;" || echo "Table 'album' not found."

      - name: Verify Healthy Deployment
        run: |
          echo "Monitoring deployment health..."
          for i in {1..15}; do
            RUNNING=$(docker service ls --filter name=zaideih_web --format "{{.Replicas}}")
            echo "Replicas: $RUNNING"
            if [[ "$RUNNING" == "2/2" ]]; then
              echo "Deployment successful!"
              exit 0
            fi
            sleep 10
          done
          
          docker service logs zaideih_web --tail 50
          exit 1