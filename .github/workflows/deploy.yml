name: Zaideih

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    # Rule: Commit must start with "deploy:" and have a description
    if: "startsWith(github.event.head_commit.message, 'deploy:') && length(github.event.head_commit.message) > 8"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- STEP 1: BUILD VITE ASSETS (On GitHub) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build 

      # --- STEP 2: UPLOAD BUILT ASSETS (To Server) ---
      # We do this BEFORE the SSH step so the files are ready on the disk
      - name: Copy Built Assets to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*" 
          target: "/var/www/zaideih/static/"
          strip_components: 1

      # --- STEP 3: UPDATE CODE & RESTART (On Server) ---
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/zaideih
            
            # 1. Pull the Python code changes
            git pull origin master
            
            # 2. Inject/Update the .env (Matches your standardized names)
            echo "DB_NAME=${{ secrets.DB_NAME }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PWD=${{ secrets.DB_PWD }}" >> .env
            echo "DB_ROOT_PWD=${{ secrets.DB_ROOT_PWD }}" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=3306" >> .env
            echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
            
            # 3. Build/Restart Containers
            docker-compose up --build -d
            
            # 4. Django Housekeeping
            # This moves the Vite files from /static/ to /static_root/ for Nginx
            docker-compose exec -T web python manage.py migrate
            docker-compose exec -T web python manage.py collectstatic --no-input