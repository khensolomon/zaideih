name: Build and Deploy

on:
  push:
    branches: [ master ]

# CONCURRENCY: Prevents two deployments from running at the exact same time
concurrency:
  group: production_deploy
  cancel-in-progress: false

jobs:
  # ==========================================
  # 1. BUILD PHASE
  # ==========================================
  build:
    if: startsWith(github.event.head_commit.message, 'deploy:')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Docker Builder Cache
        run: docker buildx prune -af

      # Images are tagged with both :latest and the commit SHA.
      # The SHA tag enables precise rollbacks — to roll back, change
      # IMAGE_NAME in the deploy step to the desired SHA tag.
      - name: Build and Push Django App
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository }}/django-app:latest
            ghcr.io/${{ github.repository }}/django-app:${{ github.sha }}

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository }}/nginx-prod:latest
            ghcr.io/${{ github.repository }}/nginx-prod:${{ github.sha }}

  # ==========================================
  # 2. SELF-HOSTED PHASE (Checks runner status first)
  # ==========================================
  check_local_vm_runner:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      is_online: ${{ steps.runner_status.outputs.is_online }}
    steps:
      - name: Check Self-Hosted Runner Status
        id: runner_status
        run: |
          echo "Checking runner status via GitHub API..."
          RESPONSE=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.VM_RUNNER_STATUS_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners")

          IS_ONLINE=$(echo "$RESPONSE" | jq -r 'if .runners then (any(.runners[]; .status == "online")) else "false" end')

          echo "Local runner online status: $IS_ONLINE"
          echo "is_online=$IS_ONLINE" >> "$GITHUB_OUTPUT"

  # MUTEX: deploy_via_selfhosted only fires when neither [tunnel] nor [ssh] is
  # present in the commit message. This makes the three deploy paths fully
  # mutually exclusive — exactly one runs per push, never two against the
  # same server in parallel.
  deploy_via_selfhosted:
    name: "🏠 Self-Hosted Runner Deploy"
    needs: [build, check_local_vm_runner]
    if: |
      needs.check_local_vm_runner.outputs.is_online == 'true' &&
      !contains(github.event.head_commit.message, '[tunnel]') &&
      !contains(github.event.head_commit.message, '[ssh]')
    runs-on: self-hosted
    environment: deploy_via_selfhosted
    steps:
      - name: "[Self-Hosted] Checkout code"
        uses: actions/checkout@v4

      - name: "[Self-Hosted] Authenticate with GHCR on VM"
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: "[Self-Hosted] Build merged .env from secrets"
        id: env_build
        uses: ./.github/actions/build-env
        with:
          base: ${{ secrets.ENV_FILE_CONTENT }}
          overrides: ${{ secrets.ENV_OVERRIDES }}

      # Place .env at /opt/<app>/.env for consistency with Tunnel/SSH deploy
      # paths, which scp it to that exact location. This makes /opt/<app>/.env
      # a reliable marker that the app exists on this host (used by r2.py and
      # any other tool that needs to detect deployed apps).
      - name: "[Self-Hosted] Place .env and prepare host directories"
        run: |
          set -a
          [ -f .env ] && . .env
          set +a
          sudo mkdir -p /opt/zaideih \
                        "${STORAGE_ROOT}" \
                        "${MEDIA_ROOT}" \
                        "${DB_DIR}" \
                        "${STORE_DIR:-/opt/bucket/store}" \
                        "${CACHE_DIR:-/opt/bucket/cache}"
          sudo cp .env /opt/zaideih/.env
          sudo chmod 600 /opt/zaideih/.env

      - name: "[Self-Hosted] Deploy stack to swarm"
        run: |
          set -a
          [ -f .env ] && . .env
          set +a
          export GITHUB_REPOSITORY=${{ github.repository }}
          export COMMIT_SHA=${{ github.sha }}

          docker compose -f docker.production.yml pull
          docker stack deploy -c docker.production.yml --with-registry-auth --detach=false zaideih

      # shell: bash required — brace expansion {1..20} is bash-only, not POSIX sh
      - name: "[Self-Hosted] Wait for MySQL readiness (real credentials)"
        shell: bash
        run: |
          NETWORK_NAME="zaideih_default"
          set -a
          [ -f .env ] && . .env
          set +a
          ready=0
          for i in {1..20}; do
            if docker run --rm --network "$NETWORK_NAME" --env-file .env mysql:8.0 \
                 sh -c 'mysqladmin ping -h "$DB_HOST" -u "$DB_USER" --password="$DB_PWD"' \
                 > /dev/null 2>&1; then
              echo "MySQL is ready (authenticated as $DB_USER@$DB_HOST)."
              ready=1
              break
            fi
            echo "Waiting for MySQL... attempt $i/20"
            sleep 5
          done
          if [ "$ready" -ne 1 ]; then
            echo "ERROR: MySQL did not become ready after 20 attempts (~100s). Aborting."
            echo "Hint: check that DB_USER and DB_PWD in the merged .env match the credentials the database was initialized with."
            exit 1
          fi

      - name: "[Self-Hosted] Run Django migrations (pinned to commit SHA)"
        run: |
          NETWORK_NAME="zaideih_default"
          IMAGE_NAME="ghcr.io/${{ github.repository }}/django-app:${{ github.sha }}"
          docker run --rm --network "$NETWORK_NAME" \
            --env-file .env \
            -e DB_HOST=db \
            -e DB_PORT=3306 \
            "$IMAGE_NAME" python manage.py migrate --noinput

      - name: "[Self-Hosted] Verify replicas and prune images"
        run: |
          RUNNING=$(docker service ls --filter name=zaideih_web --format "{{.Replicas}}")
          if [[ "$RUNNING" == "2/2" ]]; then
            echo "Deployment successful!"
            echo "Cleaning up old Docker images..."
            docker image prune -af
            exit 0
          else
            echo "Deployment failed health checks. Replicas: $RUNNING"
            exit 1
          fi

      - name: "[Self-Hosted] Write deployment summary"
        if: success()
        run: |
          COMPOSE_SHA="$(sha256sum docker.production.yml | awk '{print $1}')"
          {
            echo "### 🏠 Self-Hosted Runner Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Path | Self-hosted runner on target VM (no network hop) |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Image tag | \`${{ github.sha }}\` |"
            echo "| Triggered by | ${{ github.event.head_commit.message }} |"
            echo "| Completed at | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |"
            echo "| .env keys merged | ${{ steps.env_build.outputs.keys_count }} |"
            echo "| .env SHA-256 | \`${{ steps.env_build.outputs.content_sha256 }}\` |"
            echo "| compose SHA-256 | \`${COMPOSE_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "[Self-Hosted] Dump service logs on failure"
        if: failure()
        run: |
          echo "=== SELF-HOSTED RUNNER LOGS ==="
          echo "--- WEB ---"
          docker service logs zaideih_web --tail 100 || true
          echo "--- NGINX ---"
          docker service logs zaideih_nginx --tail 100 || true
          echo "--- DB ---"
          docker service logs zaideih_db --tail 100 || true

  # ==========================================
  # 3. REMOTE PHASE: TUNNEL DEPLOYMENT
  # ==========================================
  # MUTEX: [tunnel] and [ssh] are mutually exclusive.
  # If both appear in the commit message, [tunnel] wins and [ssh] is suppressed.
  # Never intentionally use both tags — they target the same server.
  deploy_via_tunnel:
    name: "☁️ Cloudflare Tunnel Deploy"
    needs: build
    if: |
      contains(github.event.head_commit.message, '[tunnel]') &&
      !contains(github.event.head_commit.message, '[ssh]')
    runs-on: ubuntu-latest
    environment: deploy_via_tunnel
    steps:
      - name: "[Tunnel] Checkout code"
        uses: actions/checkout@v4

      # Cloudflared is pinned to a specific version to prevent surprise breakage
      # from upstream releases. Update the version key deliberately when needed.
      # Releases: https://github.com/cloudflare/cloudflared/releases
      - name: "[Tunnel] Cache cloudflared binary"
        uses: actions/cache@v4
        id: cache-cloudflared
        with:
          path: /usr/local/bin/cloudflared
          key: cloudflared-2025.4.0

      - name: "[Tunnel] Install cloudflared (cache miss only)"
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/download/2025.4.0/cloudflared-linux-amd64.deb
          sudo dpkg -i --force-overwrite cloudflared-linux-amd64.deb

      - name: "[Tunnel] Configure SSH via Cloudflare proxy"
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # StrictHostKeyChecking accept-new: trusts the host key on first
          # connection and enforces it on all subsequent connections.
          # ssh-keyscan is intentionally omitted — it requires raw TCP to port 22
          # which is closed. The tunnel delivers connections via Cloudflare,
          # not directly to port 22, so keyscan cannot work here.
          cat << EOF > ~/.ssh/config
          Host prod-server
              HostName ${{ secrets.SERVER_HOSTNAME }}
              User ${{ secrets.SERVER_USER }}
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking accept-new
              UserKnownHostsFile ~/.ssh/known_hosts
              ProxyCommand cloudflared access ssh --hostname ${{ secrets.SERVER_HOSTNAME }} --service-token-id ${{ secrets.CF_SERVICE_TOKEN_ID }} --service-token-secret ${{ secrets.CF_SERVICE_TOKEN_SECRET }}
          EOF
          chmod 600 ~/.ssh/config

      - name: "[Tunnel] Debug cloudflared access"
        run: |
          cloudflared access ssh \
            --hostname "${{ secrets.SERVER_HOSTNAME }}" \
            --service-token-id "${{ secrets.CF_SERVICE_TOKEN_ID }}" \
            --service-token-secret "${{ secrets.CF_SERVICE_TOKEN_SECRET }}" \
            --log-level debug 2>&1 | head -50 || true

      - name: "[Tunnel] Build merged .env from secrets"
        id: env_build
        uses: ./.github/actions/build-env
        with:
          base: ${{ secrets.ENV_FILE_CONTENT }}
          overrides: ${{ secrets.ENV_OVERRIDES }}

      - name: "[Tunnel] Ship files via SCP over tunnel"
        run: |
          ssh -F ~/.ssh/config prod-server "mkdir -p /opt/zaideih"
          scp -F ~/.ssh/config docker.production.yml .env prod-server:/opt/zaideih/
          # Tighten permissions on the server. The runner-local .env is 0644
          # (so the SCP action can read it), but on the server it holds real
          # secrets and must be 0600.
          ssh -F ~/.ssh/config prod-server "chmod 600 /opt/zaideih/.env"

      - name: "[Tunnel] Execute remote deployment over tunnel"
        run: |
          ssh -F ~/.ssh/config prod-server << 'ENDSSH'
            set -e
            cd /opt/zaideih

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            set -a; [ -f .env ] && . .env; set +a
            export GITHUB_REPOSITORY="${{ github.repository }}"
            export COMMIT_SHA="${{ github.sha }}"

            # Ensure all host paths exist before swarm tries to bind-mount them.
            # Missing dirs cause swarm to fail the deploy with no clear message.
            sudo mkdir -p "${STORAGE_ROOT}" \
                          "${MEDIA_ROOT}" \
                          "${DB_DIR}" \
                          "${STORE_DIR:-/opt/bucket/store}" \
                          "${CACHE_DIR:-/opt/bucket/cache}"

            docker compose -f docker.production.yml pull
            docker stack deploy -c docker.production.yml --with-registry-auth --detach=false zaideih

            NETWORK_NAME="zaideih_default"
            IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY}/django-app:${COMMIT_SHA}"

            # Wait for MySQL to actually accept connections (with real creds)
            # before migrating. 'stack deploy --detach=false' returns when
            # services converge, but MySQL may still be initializing inside.
            ready=0
            for i in $(seq 1 20); do
              if docker run --rm --network "$NETWORK_NAME" --env-file .env mysql:8.0 \
                   sh -c 'mysqladmin ping -h "$DB_HOST" -u "$DB_USER" --password="$DB_PWD"' \
                   > /dev/null 2>&1; then
                echo "MySQL is ready (authenticated as $DB_USER@$DB_HOST)."
                ready=1
                break
              fi
              echo "Waiting for MySQL... attempt $i/20"
              sleep 5
            done
            if [ "$ready" -ne 1 ]; then
              echo "ERROR: MySQL did not become ready after 20 attempts."
              echo "Hint: check that DB_USER and DB_PWD in /opt/zaideih/.env match the credentials the database was initialized with."
              exit 1
            fi

            # Migrate with DB_HOST overridden — guards against .env containing
            # 'localhost' (which MySQLdb interprets as a Unix socket).
            docker run --rm --network "$NETWORK_NAME" \
              --env-file .env \
              -e DB_HOST=db \
              -e DB_PORT=3306 \
              "$IMAGE_NAME" python manage.py migrate --noinput

            echo "Cleaning up old Docker images..."
            docker image prune -af
          ENDSSH

      - name: "[Tunnel] Write deployment summary"
        if: success()
        run: |
          COMPOSE_SHA="$(sha256sum docker.production.yml | awk '{print $1}')"
          {
            echo "### ☁️ Cloudflare Tunnel Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Path | Cloudflare Zero Trust SSH (port 22 closed) |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Image tag | \`${{ github.sha }}\` |"
            echo "| Triggered by | ${{ github.event.head_commit.message }} |"
            echo "| Completed at | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |"
            echo "| .env keys merged | ${{ steps.env_build.outputs.keys_count }} |"
            echo "| .env SHA-256 | \`${{ steps.env_build.outputs.content_sha256 }}\` |"
            echo "| compose SHA-256 | \`${COMPOSE_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "[Tunnel] Dump service logs on failure"
        if: failure()
        run: |
          echo "=== TUNNEL DEPLOY LOGS ==="
          if [ ! -f ~/.ssh/config ]; then
            echo "SSH config was never created — failure occurred before SSH setup. Skipping remote log dump."
            exit 0
          fi
          ssh -F ~/.ssh/config prod-server << 'ENDSSH'
            echo "--- WEB ---"
            docker service logs zaideih_web --tail 100 || true
            echo "--- NGINX ---"
            docker service logs zaideih_nginx --tail 100 || true
            echo "--- DB ---"
            docker service logs zaideih_db --tail 100 || true
          ENDSSH

  # ==========================================
  # 4. REMOTE PHASE: NATIVE SSH DEPLOYMENT
  # ==========================================
  # MUTEX: [ssh] only fires when [tunnel] is NOT also present.
  # Use [ssh] for environments where port 22 is open directly.
  deploy_via_ssh:
    name: "🔑 Native SSH Deploy"
    needs: build
    if: |
      contains(github.event.head_commit.message, '[ssh]') &&
      !contains(github.event.head_commit.message, '[tunnel]')
    runs-on: ubuntu-latest
    environment: deploy_via_ssh
    steps:
      - name: "[SSH] Checkout code"
        uses: actions/checkout@v4

      - name: "[SSH] Build merged .env from secrets"
        id: env_build
        uses: ./.github/actions/build-env
        with:
          base: ${{ secrets.ENV_FILE_CONTENT }}
          overrides: ${{ secrets.ENV_OVERRIDES }}

      - name: "[SSH] Ship files via native SCP"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOSTNAME }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker.production.yml,.env"
          target: "/opt/zaideih/"

      - name: "[SSH] Execute remote deployment via native SSH"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOSTNAME }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/zaideih

            # Tighten permissions on the server. The runner-local .env is 0644
            # (so the SCP action can read it), but on the server it holds real
            # secrets and must be 0600.
            chmod 600 /opt/zaideih/.env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            export COMMIT_SHA="${{ github.sha }}"
            export GITHUB_REPOSITORY="${{ github.repository }}"

            set -a; [ -f .env ] && . .env; set +a

            # Ensure all host paths exist before swarm tries to bind-mount them.
            # Past deployments have silently failed here with no clear message.
            sudo mkdir -p "${STORAGE_ROOT}" \
                          "${MEDIA_ROOT}" \
                          "${DB_DIR}" \
                          "${STORE_DIR:-/opt/bucket/store}" \
                          "${CACHE_DIR:-/opt/bucket/cache}"

            echo "Pulling images with SHA tag..."
            docker compose -f docker.production.yml pull

            echo "Deploying stack..."
            docker stack deploy -c docker.production.yml --with-registry-auth --detach=false zaideih

            # === Wait for services to be created ===
            echo "Waiting for services to converge..."
            sleep 10

            NETWORK_NAME="zaideih_default"
            IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY}/django-app:${COMMIT_SHA}"

            # MySQL readiness check using real credentials from .env
            ready=0
            for i in $(seq 1 30); do
              if docker run --rm --network "$NETWORK_NAME" --env-file .env mysql:8.0 \
                   sh -c 'mysqladmin ping -h "$DB_HOST" -u "$DB_USER" --password="$DB_PWD"' \
                   > /dev/null 2>&1; then
                echo "MySQL is ready (authenticated as $DB_USER@$DB_HOST)."
                ready=1
                break
              fi
              echo "Waiting for MySQL... attempt $i/30"
              sleep 6
            done
            if [ "$ready" -ne 1 ]; then
              echo "ERROR: MySQL did not become ready."
              echo "Hint: check that DB_USER and DB_PWD in /opt/zaideih/.env match the credentials the database was initialized with."
              exit 1
            fi

            echo "Running migrations with exact SHA image..."
            docker run --rm --network "$NETWORK_NAME" \
              --env-file .env \
              -e DB_HOST=db \
              -e DB_PORT=3306 \
              "$IMAGE_NAME" python manage.py migrate --noinput

            echo "Cleaning up old images..."
            docker image prune -af --filter "until=24h"

      - name: "[SSH] Write deployment summary"
        if: success()
        run: |
          COMPOSE_SHA="$(sha256sum docker.production.yml | awk '{print $1}')"
          {
            echo "### 🔑 Native SSH Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Path | Direct SSH over port 22 |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Image tag | \`${{ github.sha }}\` |"
            echo "| Triggered by | ${{ github.event.head_commit.message }} |"
            echo "| Completed at | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |"
            echo "| .env keys merged | ${{ steps.env_build.outputs.keys_count }} |"
            echo "| .env SHA-256 | \`${{ steps.env_build.outputs.content_sha256 }}\` |"
            echo "| compose SHA-256 | \`${COMPOSE_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "[SSH] Dump service logs on failure"
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOSTNAME }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== SSH DEPLOY LOGS ==="
            echo "--- WEB ---"
            docker service logs zaideih_web --tail 100 || true
            echo "--- NGINX ---"
            docker service logs zaideih_nginx --tail 100 || true
            echo "--- DB ---"
            docker service logs zaideih_db --tail 100 || true