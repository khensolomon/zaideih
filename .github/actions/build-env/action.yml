name: "Build merged .env"
description: >
  Merges three env-file layers into a single .env file. Layers are applied in
  order: env_base (required, sensitive), var_base (optional, non-sensitive),
  env_overrides (optional, sensitive, final override). Last assignment of each
  key wins. Comments and blank lines are stripped. Values are masked in logs.
  Fails on common deploy-breaking misconfigurations.

inputs:
  env_base:
    description: >
      Required. Sensitive base layer (Environment Secret named ENV_BASE).
      Holds the full default key=value set for the environment.
      Empty or missing is a fatal error — every environment must define this.
    required: true
  var_base:
    description: >
      Optional. Non-sensitive override layer (Environment Variable named
      VAR_BASE). Overrides matching keys from env_base. Empty/missing is fine.
      Refuses to merge if it contains keys matching sensitive-looking patterns
      (_PWD, _PASSWORD, _SECRET, _KEY, _TOKEN) — those belong in env_overrides.
    required: false
    default: ""
  env_overrides:
    description: >
      Optional. Sensitive final-override layer (Environment Secret named
      ENV_OVERRIDES). Wins over both env_base and var_base. Use for values
      that must remain encrypted in the GitHub UI. Empty/missing is fine.
    required: false
    default: ""
  output:
    description: "Path to write the merged .env file."
    required: false
    default: ".env"

outputs:
  keys_count:
    description: "Number of distinct KEY=VALUE pairs in the merged file."
    value: ${{ steps.merge.outputs.keys_count }}
  content_sha256:
    description: "SHA-256 of the merged file content. Safe to log; reveals nothing."
    value: ${{ steps.merge.outputs.content_sha256 }}

runs:
  using: "composite"
  steps:
    - id: merge
      shell: bash
      env:
        ENV_BASE_INPUT:      ${{ inputs.env_base }}
        VAR_BASE_INPUT:      ${{ inputs.var_base }}
        ENV_OVERRIDES_INPUT: ${{ inputs.env_overrides }}
        OUTPUT_PATH:         ${{ inputs.output }}
      run: |
        set -euo pipefail

        # ----- Required: env_base must be present -----
        # An environment with no ENV_BASE secret is almost certainly a setup
        # mistake. Catch it loudly here rather than producing a broken .env.
        if [ -z "${ENV_BASE_INPUT//[[:space:]]/}" ]; then
          echo "::error::env_base is empty. This environment must define an ENV_BASE secret with the default key=value set."
          exit 1
        fi

        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT

        # Using printf with %s (not echo) preserves content verbatim — no
        # backslash interpretation, no trailing newline surprises.
        printf '%s\n' "$ENV_BASE_INPUT"      > "$tmpdir/1_env_base.env"
        printf '%s\n' "$VAR_BASE_INPUT"      > "$tmpdir/2_var_base.env"
        printf '%s\n' "$ENV_OVERRIDES_INPUT" > "$tmpdir/3_env_overrides.env"

        # ----- Guardrail: no sensitive-looking keys in VAR_BASE -----
        # VAR_BASE is stored as a GitHub Environment Variable — unencrypted,
        # visible in the UI, not masked in logs. Anything matching common
        # secret-key patterns belongs in env_overrides, not here.
        if grep -iE '^[[:space:]]*[^#=]*(_PWD|_PASSWORD|_SECRET|_KEY|_TOKEN)[[:space:]]*=' "$tmpdir/2_var_base.env" > /dev/null 2>&1; then
          bad_keys="$(grep -iE '^[[:space:]]*[^#=]*(_PWD|_PASSWORD|_SECRET|_KEY|_TOKEN)[[:space:]]*=' "$tmpdir/2_var_base.env" | awk -F= '{print $1}' | tr -d '[:space:]' | paste -sd, -)"
          echo "::error::var_base contains sensitive-looking keys: ${bad_keys}. Move them to env_overrides (Environment Secret ENV_OVERRIDES) — VAR_BASE is stored unencrypted."
          exit 1
        fi

        # ----- Merge: 1_env_base -> 2_var_base -> 3_env_overrides -----
        # awk picks the LAST assignment of each key (precedence: overrides win).
        # Order of first appearance is preserved. Comments and blanks dropped.
        # Whitespace around '=' is stripped defensively.
        cat "$tmpdir/1_env_base.env" "$tmpdir/2_var_base.env" "$tmpdir/3_env_overrides.env" | awk '
          /^[[:space:]]*#/ { next }
          /^[[:space:]]*$/ { next }
          {
            eq = index($0, "=")
            if (eq == 0) { next }                  # malformed line, skip

            key = substr($0, 1, eq - 1)
            val = substr($0, eq + 1)

            sub(/^[[:space:]]+/, "", key)
            sub(/[[:space:]]+$/, "", key)
            sub(/^[[:space:]]+/, "", val)
            sub(/[[:space:]]+$/, "", val)
            sub(/\r$/, "", val)

            if (!(key in seen)) {
              order[++n] = key
              seen[key] = 1
            }
            env[key] = val
          }
          END {
            for (i = 1; i <= n; i++) {
              k = order[i]
              print k "=" env[k]
            }
          }
        ' > "$OUTPUT_PATH"

        # The runner is ephemeral and destroyed at job end — restrictive mode
        # here gains us nothing but breaks tools that run as a different user
        # (e.g. appleboy/scp-action runs tar inside a container with its own
        # user). Server-side steps tighten the mode to 0600 after the file
        # lands at /opt/zaideih/.env, which is where it actually matters.
        chmod 644 "$OUTPUT_PATH"

        # ----- Validation -----

        keys_count="$(wc -l < "$OUTPUT_PATH" | tr -d ' ')"

        if [ "$keys_count" -eq 0 ]; then
          echo "::error::Merged .env is empty. env_base passed the non-empty check but produced no key=value lines after parsing — check for malformed content."
          exit 1
        fi

        # Guardrail: DB_HOST=localhost inside a swarm-internal deploy means
        # MySQLdb will try the Unix socket and fail with error 2002. This has
        # bitten this repo before. Block it at deploy time, not at runtime.
        if grep -qE '^DB_HOST=localhost[[:space:]]*$' "$OUTPUT_PATH"; then
          echo "::error::DB_HOST=localhost in merged .env will break swarm-internal connections (MySQLdb interprets 'localhost' as a Unix socket). Use DB_HOST=db for the service name in docker.production.yml."
          exit 1
        fi

        # ----- Mask every value in logs -----
        # GitHub auto-masks the original secret values, but the merged output
        # is a derived string — once a value passes through awk, GitHub no
        # longer recognizes it. Re-mask explicitly so a later `cat .env` (or
        # any debug echo) cannot leak credentials into the action log.
        while IFS='=' read -r _ value; do
          [ -n "$value" ] && echo "::add-mask::$value"
        done < "$OUTPUT_PATH"

        # ----- Fingerprint -----
        content_sha256="$(sha256sum "$OUTPUT_PATH" | awk '{print $1}')"

        echo "keys_count=$keys_count"           >> "$GITHUB_OUTPUT"
        echo "content_sha256=$content_sha256"   >> "$GITHUB_OUTPUT"

        # Visible, value-free summary in the step log. Per-layer counts give
        # a quick sanity check that each layer landed without leaking values.
        base_lines="$(grep -cE '^[[:space:]]*[^#[:space:]].*=' "$tmpdir/1_env_base.env"      || true)"
        var_lines="$(grep  -cE '^[[:space:]]*[^#[:space:]].*=' "$tmpdir/2_var_base.env"      || true)"
        ovr_lines="$(grep  -cE '^[[:space:]]*[^#[:space:]].*=' "$tmpdir/3_env_overrides.env" || true)"

        echo "Merged .env written to: $OUTPUT_PATH"
        echo "  env_base lines:      $base_lines"
        echo "  var_base lines:      $var_lines"
        echo "  env_overrides lines: $ovr_lines"
        echo "  final keys:          $keys_count"
        echo "  SHA-256:             $content_sha256"