services:
  db:
    image: mysql:8.0
    env_file: .env
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_PASSWORD=${DB_PWD}
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes  # Allows root to connect without a password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      default:
        aliases:
          - localhost
    volumes:
      - mysql_volume:/var/lib/mysql
      - ${DB_DIR}:/docker-entrypoint-initdb.d:ro

  web:
    build: .
    restart: always
    env_file: .env
    ports: 
      - "${APP_PORT}:${APP_PORT}"
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/code
      - ./staticfiles:/code/staticfiles   # ← bind mount instead of named volume
      - storage_volume:${STORAGE_DIR}:rw
      - media_volume:${MEDIA_DIR}:rw
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 10s
      timeout: 10s
      retries: 2
      start_period: 180s
    working_dir: /code
    environment:
      - DEBUG=false
      - PYTHONPATH=/code
      - APP_PORT=${APP_PORT}
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PWD=${DB_PWD}

  nginx:
    image: nginx:latest
    build: ./nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./staticfiles:/code/staticfiles:ro   # ← same bind mount, read-only for nginx
      - ./cache:/code/cache
      - ./nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      - APP_PORT=${APP_PORT}
    depends_on:
      web:
        condition: service_healthy

volumes:
  mysql_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/mysql/data
  # static_volume:
  storage_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_DIR}
  media_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_DIR}