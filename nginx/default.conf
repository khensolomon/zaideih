# Define cache path (Must be outside server block)
# keys_zone=STATIC:10m (10MB for keys), max_size=1g (1GB total cache)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=django_cache:10m max_size=1g inactive=60m use_temp_path=off;

# Docker DNS resolver (VERY important for Swarm)
resolver 127.0.0.11 valid=10s;

upstream zaideih {
    # In Swarm, 'web' resolves to the VIP of the service
    server web:${APP_PORT};
    keepalive 32; # Keep connections open for better performance
}

server {
    listen 80;
    # server_name _;
    server_name zaideih.com zaideih.local zaideih.test;

    # --- Security Protections ---
    server_tokens off; # Hide Nginx version
    client_max_body_size 20M; # Limit upload size

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Remove X-XSS-Protection — deprecated in modern browsers
    # add_header X-XSS-Protection "1; mode=block" always;

    # Strong CSP for the specific setup (upgrade-insecure-requests is optional, belongs in production)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src https://www.googletagmanager.com; frame-ancestors 'none';" always;

    # --- Proxy Settings (Django) ---
    location / {
        proxy_pass http://zaideih;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important for stability
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # --- Favicon (location /favicon.ico) ---
    location ~* ^/favicon\.(ico|png)$ {
        root /code/staticfiles;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # --- Root Static Files (robots.txt, app.webmanifest, etc.) ---
    location ~ ^/(robots\.txt|app\.webmanifest)$ {
        root /code/staticfiles;
        access_log off;
        log_not_found off;
        expires 30d;
    }

    # --- Static Files (Browser Caching) ---
    location /static/ {
        alias /code/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        autoindex on; # SECURITY: Turn this off in production
    }

    # --- Media/Cache Files (.mp3 / Large Files) ---
    # location /cache/ {
    #     alias /code/cache/;
    #     expires 7d;
    #     add_header Cache-Control "public";
    #     autoindex on;
        
    #     # Micro-caching or Byte-range support for audio
    #     proxy_cache django_cache;
    #     proxy_cache_valid 200 60m;
    #     add_header X-Cache-Status $upstream_cache_status;
    # }

    # --- Gzip Compression ---
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_vary on;
}