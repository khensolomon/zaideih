# Define cache path (Must be outside server block)
# keys_zone=STATIC:10m (10MB for keys), max_size=1g (1GB total cache)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=django_cache:10m max_size=1g inactive=60m use_temp_path=off;

upstream zaideih {
    # In Swarm, 'web' resolves to the VIP of the service
    server web:${APP_PORT};
    keepalive 32; # Keep connections open for better performance
}

server {
    listen 80;
    server_name zaideih.com zaideih.local zaideih.test;

    # --- Security Protections ---
    server_tokens off; # Hide Nginx version
    client_max_body_size 20M; # Limit upload size

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # --- Proxy Settings (Django) ---
    location / {
        proxy_pass http://zaideih;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Basic Rate Limiting could be added here if needed
    }

    # --- Static Files (Browser Caching) ---
    location /static/ {
        alias /code/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        autoindex on; # SECURITY: Turn this off in production
    }

    # --- Media/Cache Files (.mp3 / Large Files) ---
    location /cache/ {
        alias /code/cache/;
        expires 7d;
        add_header Cache-Control "public";
        autoindex on;
        
        # Micro-caching or Byte-range support for audio
        proxy_cache django_cache;
        proxy_cache_valid 200 60m;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --- Gzip Compression ---
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_vary on;
}