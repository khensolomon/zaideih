version: '3.8'

services:
  db:
    restart: "" # Swarm uses deploy.restart_policy
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  web:
    build: ""
    image: ghcr.io/${GITHUB_REPOSITORY}/django-app:latest
    restart: ""
    # FIXED: Overriding the complex depends_on from base file with a simple list for Swarm
    depends_on:
      - db
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      restart_policy:
        condition: on-failure

  nginx:
    build: ""
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx-prod:latest
    restart: ""
    # FIXED: Overriding complex depends_on for Swarm compatibility
    depends_on:
      - web
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

# In Production Swarm, we typically don't mount the local folder (.) 
# because the code is already inside the image.
# We keep only the persistent data volumes.