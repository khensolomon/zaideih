# REMOVED: version: '3.8' (Attribute is obsolete and causes warnings)

services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PWD}
      - MYSQL_PASSWORD=${DB_PWD}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 5
    networks:
      - default
    volumes:
      - mysql_data:/var/lib/mysql
      - ${DB_DIR}:/docker-entrypoint-initdb.d:ro
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/django-app:latest
    ports: 
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - static_volume:/code/static
      - root_storage:${STORAGE_DIR}:rw
      - root_media:${MEDIA_DIR}:rw
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "manage.py", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 5s
    environment:
      - DEBUG=false
      - APP_PORT=${APP_PORT}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PWD}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:${APP_PORT} --worker-tmp-dir /tmp/gunicorn
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      restart_policy:
        condition: on-failure

  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx-prod:latest
    ports:
      - "80:80"
    volumes:
      - static_volume:/code/static:ro
      - ./cache:/code/cache
    environment:
      - APP_PORT=${APP_PORT}
    depends_on:
      - web
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  default:
    driver: overlay

volumes:
  mysql_data:
  static_volume:
  root_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_DIR}
  root_media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_DIR}