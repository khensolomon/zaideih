services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PWD}
      - MYSQL_PASSWORD=${DB_PWD}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 5
    networks:
      - default
    volumes:
      - mysql_data:/var/lib/mysql
      - ${DB_DIR}:/docker-entrypoint-initdb.d:ro
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/django-app:latest
    ports: 
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - static_volume:/code/static
      - root_storage:${STORAGE_DIR}:rw
      - root_media:${MEDIA_DIR}:rw
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "manage.py", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 5s
    environment:
      # Django Core & App Info
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - APP_NAME=${APP_NAME}
      - APP_PORT=${APP_PORT}
      
      # Database
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PWD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PWD}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PWD=${DB_PWD}
      - DB_ROOT_PWD=${DB_ROOT_PWD}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DIR=${DB_DIR}
      
      # Storage & Paths
      - STORAGE_DIR=${STORAGE_DIR}
      - CACHE_DIR=${CACHE_DIR}
      - MEDIA_DIR=${MEDIA_DIR}
      
      # Infrastructure & Cloud
      - GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}
      - BUCKETNAME=${BUCKETNAME}
      - BUCKETCRED=${BUCKETCRED}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-${BUCKETCRED}}
      
    command: gunicorn config.wsgi:application --bind 0.0.0.0:${APP_PORT} --worker-tmp-dir /tmp/gunicorn
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      restart_policy:
        condition: on-failure

  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx-prod:latest
    ports:
      - "80:80"
    volumes:
      - static_volume:/code/static:ro
      - ./cache:/code/cache
    environment:
      - APP_PORT=${APP_PORT}
    depends_on:
      - web
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  default:
    driver: overlay
    attachable: true

volumes:
  mysql_data:
  static_volume:
  root_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_DIR}
  root_media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_DIR}