version: '3.8'

services:
  db:
    restart: "" # Swarm uses deploy.restart_policy
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  web:
    build: ""
    image: ghcr.io/${GITHUB_REPOSITORY}/django-app:latest
    restart: ""
    # Override complex depends_on from base file with a simple list
    depends_on:
      - db
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      restart_policy:
        condition: on-failure

  nginx:
    build: ""
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx-prod:latest
    restart: ""
    # FIXED: Overriding complex depends_on for Nginx as well
    depends_on:
      - web
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

# Note: Swarm handles cross-service communication via the stack network automatically.