services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PWD}
      - MYSQL_PASSWORD=${DB_PWD}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    volumes:
      - mysql_data:/var/lib/mysql
      - ${DB_DIR}:/docker-entrypoint-initdb.d:ro
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/django-app:latest
    ports: 
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - static_volume:/code/static
      - storage_volume:${STORAGE_DIR}:rw
      - media_volume:${MEDIA_DIR}:rw
    depends_on:
      - db
    healthcheck:
      # CRITICAL for ZDD: Swarm uses this to know when the NEW container is ready
      test: ["CMD", "python", "manage.py", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - APP_NAME=${APP_NAME}
      - APP_PORT=${APP_PORT}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PWD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PWD}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PWD=${DB_PWD}
      - DB_ROOT_PWD=${DB_ROOT_PWD}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DIR=${DB_DIR}
      - STORAGE_DIR=${STORAGE_DIR}
      - CACHE_DIR=${CACHE_DIR}
      - MEDIA_DIR=${MEDIA_DIR}
      - GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}
      - BUCKETNAME=${BUCKETNAME}
      - BUCKETCRED=${BUCKETCRED}
      - GOOGLE_APPLICATION_CREDENTIALS=${BUCKETCRED}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:${APP_PORT} --worker-tmp-dir /tmp/gunicorn --workers 3
    deploy:
      replicas: 2
      update_config:
        # CRITICAL for ZDD: Start the new container before killing the old one
        order: start-first
        # Only update one at a time so at least 1 (or 2) old ones stay alive
        parallelism: 1
        # Wait for the healthcheck to pass before moving to the next container
        delay: 15s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.1
      restart_policy:
        condition: on-failure

  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx-prod:latest
    ports:
      - "80:80"
    volumes:
      - static_volume:/code/static:ro
      - ./cache:/code/cache
    environment:
      - APP_PORT=${APP_PORT}
    depends_on:
      - web
    deploy:
      replicas: 1
      update_config:
        order: start-first
      restart_policy:
        condition: on-failure

networks:
  default:
    driver: overlay
    attachable: true

volumes:
  mysql_data:
  static_volume:
  storage_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_DIR}
  media_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_DIR}