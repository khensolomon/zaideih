version: '3.8'

services:
  web:
    # Override ONLY what we need for development
    command: python manage.py runserver 0.0.0.0:${APP_PORT}

    # Optional but recommended for better reload behavior
    environment:
      - DEBUG=true
      - DJANGO_DEBUG=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

    # # Keep your existing volumes, just ensure code is mounted
    # volumes:
    #   - .:/code
    #   - static_volume:/code/static
    #   - storage_volume:/app/storage/:rw
    #   - media_volume:/app/media:rw

    # If you ever had permission weirdness, this helps:
    stdin_open: true
    tty: true

  nginx:
    # 🚫 Disable nginx in dev (optional but recommended)
    profiles:
      - prod

  frontend:
    image: node:22
    working_dir: /code
    # command: npm run dev
    # command: npm run dev -- --host 0.0.0.0
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with file change detection
    volumes:
      - .:/code
      - frontend_node_modules:/code/node_modules # Changed to a NAMED volume
    ports:
      - "8081:8081"

volumes:
  frontend_node_modules: # Define the named volume here